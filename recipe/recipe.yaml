schema_version: 1

context:
  name: wtf-peewee
  version: 3.2.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 3674dca713e25d2fd22a9523ecf5d7a37c60e1220fe9044fcf8153e60605c73a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - peewee >=3.0.0
    - wtforms >=3.0
tests:
  - python:
      imports:
        - wtfpeewee
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: WTForms integration for peewee models
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/coleifer/wtf-peewee/

extra:
  recipe-maintainers:
    - jan-janssen
